<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UTA PRO - Dữ Liệu Riêng Biệt</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <style>
        :root { --blue: #00aaff; --green: #238636; --red: #da3633; --gray: #30363d; --card: #161b22; }
        body { background: #0b0e14; color: white; font-family: sans-serif; margin: 0; padding: 10px; display: flex; flex-direction: column; align-items: center; }
        .box { background: var(--card); border: 1px solid #333; border-radius: 12px; padding: 15px; width: 100%; max-width: 420px; box-sizing: border-box; margin-top: 10px; }
        input, textarea { width: 100%; padding: 12px; margin: 6px 0; border-radius: 8px; border: 1px solid var(--gray); background: #0d1117; color: white; box-sizing: border-box; }
        button { width: 100%; padding: 12px; margin: 5px 0; border-radius: 8px; border: none; font-weight: bold; cursor: pointer; color: white; }
        .tabs { display: flex; gap: 5px; width: 100%; max-width: 420px; }
        .tab-btn { background: var(--gray); flex: 1; padding: 10px; border-radius: 8px; font-size: 11px; }
        .tab-btn.active { background: var(--blue); }
        .hidden { display: none; }
        .menu-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin: 10px 0; max-height: 150px; overflow-y: auto; padding: 5px; border: 1px solid #333; border-radius: 8px; }
        .menu-item { background: #21262d; padding: 8px; border-radius: 6px; font-size: 12px; text-align: center; border: 1px solid #444; }
        .result { background: #010409; padding: 12px; border-radius: 8px; font-size: 13px; color: #58a6ff; white-space: pre-wrap; margin-top: 10px; border: 1px solid #333; }
        h2 { color: var(--blue); text-align: center; font-size: 18px; margin: 5px 0; border-bottom: 1px solid #333; padding-bottom: 5px; }
    </style>
</head>
<body>

    <div id="auth_panel" class="box">
        <h2>UTA LOGIN</h2>
        <input type="text" id="au" placeholder="Tên đăng nhập">
        <input type="password" id="ap" placeholder="Mật khẩu">
        <button style="background: var(--blue);" onclick="login()">ĐĂNG NHẬP</button>
        <button style="background: var(--green);" onclick="reg()">ĐĂNG KÝ</button>
    </div>

    <div id="main_panel" class="hidden" style="width: 100%; max-width: 420px;">
        <p id="user_display" style="font-size: 12px; color: #8b949e; text-align: center;"></p>
        <div class="tabs">
            <button class="tab-btn active" onclick="tab('t1')">KHO ACC</button>
            <button class="tab-btn" onclick="tab('t2')">ĐƠN CÀY</button>
            <button class="tab-btn" onclick="tab('t3')">CÀI ĐẶT</button>
        </div>

        <div id="t1" class="box content">
            <h2>🔐 KHO ACC RIÊNG</h2>
            <input type="text" id="acc_u" placeholder="Tên Roblox">
            <input type="text" id="acc_p" placeholder="Mật khẩu">
            <textarea id="acc_i" placeholder="Ghi chú acc..." rows="2"></textarea>
            <button style="background: var(--green);" onclick="saveAcc()">Lưu Vào Kho</button>
            <div id="list_acc" class="result">...</div>
        </div>

        <div id="t2" class="box content hidden">
            <h2>📝 ĐƠN CÀY RIÊNG</h2>
            <input type="text" id="order_u" placeholder="Tên Acc cần cày">
            <div id="menu_list" class="menu-grid"></div>
            <textarea id="order_d" placeholder="Nội dung đơn..." rows="3"></textarea>
            <input type="number" id="order_t" placeholder="Tổng tiền" value="0">
            <button style="background: #444; padding: 5px; font-size: 11px;" onclick="resetDraft()">Làm mới ô nhập</button>
            <button style="background: var(--blue);" onclick="saveOrder()">CHỐT ĐƠN</button>
            <div id="list_order" class="result">...</div>
        </div>

        <div id="t3" class="box content hidden">
            <h2>⚙️ MENU & XÓA</h2>
            <input type="text" id="mn" placeholder="Tên dịch vụ">
            <input type="number" id="mp" placeholder="Giá tiền">
            <button style="background: #8957e5;" onclick="addMenu()">Thêm Vào Menu</button>
            <hr style="border:0.5px solid #333; margin:15px 0;">
            <input type="text" id="del_name" placeholder="Tên Acc muốn xóa">
            <button style="background: var(--red);" onclick="delData()">Xóa Khỏi Hệ Thống</button>
        </div>
        
        <button onclick="location.reload()" style="background:none; color:#da3633; font-size:12px; margin-top:10px;">ĐĂNG XUẤT</button>
    </div>

    <script>
        const conf = { databaseURL: "https://an1324-ee78b-default-rtdb.asia-southeast1.firebasedatabase.app/" };
        firebase.initializeApp(conf);
        const db = firebase.database();
        let currentUser = ""; // Lưu tên người đang đăng nhập

        function login() {
            const u = document.getElementById('au').value, p = document.getElementById('ap').value;
            db.ref('Users/'+u).once('value', s => {
                if(s.val() && s.val().p === p) {
                    currentUser = u;
                    document.getElementById('auth_panel').classList.add('hidden');
                    document.getElementById('main_panel').classList.remove('hidden');
                    document.getElementById('user_display').innerText = "Đang dùng: " + u;
                    loadMenu(); loadAccs(); loadOrders();
                } else alert("Sai tài khoản!");
            });
        }

        function reg() {
            const u = document.getElementById('au').value, p = document.getElementById('ap').value;
            if(u&&p) db.ref('Users/'+u).set({p:p}).then(() => { alert("Đã tạo acc!"); location.reload(); });
        }

        function tab(id) {
            document.querySelectorAll('.content').forEach(c => c.classList.add('hidden'));
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(id).classList.remove('hidden');
            event.currentTarget.classList.add('active');
        }

        // --- CÁCH LY DỮ LIỆU: Thêm currentUser vào đường dẫn ---
        function saveAcc() {
            let u = document.getElementById('acc_u').value, p = document.getElementById('acc_p').value, i = document.getElementById('acc_i').value;
            if(u&&p) db.ref('Users/'+currentUser+'/AccountStorage/'+u).set({p:p, i:i}).then(()=>alert("Đã lưu!"));
        }

        function loadAccs() {
            db.ref('Users/'+currentUser+'/AccountStorage').on('value', s => {
                let txt = ""; for(let k in s.val()) txt += `• <b>${k}</b> (Pass: ${s.val()[k].p})\n  Note: ${s.val()[k].i}\n\n`;
                document.getElementById('list_acc').innerHTML = txt || "Kho trống.";
            });
        }

        function loadMenu() {
            db.ref('Users/'+currentUser+'/Menu').on('value', s => {
                const grid = document.getElementById('menu_list'); grid.innerHTML = "";
                for(let k in s.val()) {
                    let price = s.val()[k].g;
                    let btn = document.createElement('div'); btn.className = "menu-item";
                    btn.innerHTML = `<b>${k}</b><br>${price.toLocaleString()}đ`;
                    btn.onclick = () => {
                        let note = document.getElementById('order_d').value;
                        let total = parseInt(document.getElementById('order_t').value) || 0;
                        document.getElementById('order_d').value = (note === "" ? k : note + " + " + k);
                        document.getElementById('order_t').value = total + price;
                    };
                    grid.appendChild(btn);
                }
            });
        }

        function saveOrder() {
            let u = document.getElementById('order_u').value, d = document.getElementById('order_d').value, t = document.getElementById('order_t').value;
            if(u&&d) db.ref('Users/'+currentUser+'/Orders/'+u).set({d:d, t:Number(t)}).then(()=>alert("Đã chốt!"));
        }

        function loadOrders() {
            db.ref('Users/'+currentUser+'/Orders').on('value', s => {
                let txt = "", sum = 0;
                for(let k in s.val()) {
                    txt += `• <b>${k}</b>: ${s.val()[k].d} (${s.val()[k].t.toLocaleString()}đ)\n`;
                    sum += s.val()[k].t;
                }
                document.getElementById('list_order').innerHTML = txt + `\n💰 TỔNG TIỀN: ${sum.toLocaleString()}đ`;
            });
        }

        function addMenu() {
            let n = document.getElementById('mn').value, p = document.getElementById('mp').value;
            if(n&&p) db.ref('Users/'+currentUser+'/Menu/'+n).set({g: Number(p)}).then(()=>alert("Đã thêm!"));
        }

        function delData() {
            let u = document.getElementById('del_name').value;
            if(u) {
                db.ref('Users/'+currentUser+'/AccountStorage/'+u).remove();
                db.ref('Users/'+currentUser+'/Orders/'+u).remove().then(()=>alert("Đã xóa!"));
            }
        }

        function resetDraft() { document.getElementById('order_d').value = ""; document.getElementById('order_t').value = 0; }
    </script>
</body>
</html>
