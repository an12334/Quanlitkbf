<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>UTA Admin Web</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <style>
        body { background: #0b0e14; color: white; font-family: sans-serif; padding: 20px; display: flex; justify-content: center; }
        .box { border: 1px solid #333; width: 100%; max-width: 450px; padding: 25px; background: #161b22; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        h2 { color: #00aaff; text-align: center; margin-bottom: 20px; font-size: 24px; }
        input { width: 100%; padding: 12px; margin: 8px 0; border-radius: 8px; border: 1px solid #30363d; background: #0d1117; color: white; box-sizing: border-box; }
        button { width: 100%; padding: 12px; margin: 10px 0; border-radius: 8px; border: none; font-weight: bold; cursor: pointer; transition: 0.3s; }
        .btn-save { background: #238636; color: white; }
        .btn-view { background: #00aaff; color: white; }
        button:hover { opacity: 0.8; transform: scale(1.02); }
        .result { background: #010409; padding: 15px; margin-top: 15px; border-radius: 8px; border: 1px solid #30363d; min-height: 80px; white-space: pre-wrap; color: #c9d1d9; font-size: 14px; line-height: 1.6; }
    </style>
</head>
<body>
    <div class="box">
        <h2>UTA MANAGEMENT</h2>
        <input type="text" id="u" placeholder="Tên tài khoản Roblox">
        <input type="text" id="p" placeholder="Mật khẩu">
        <input type="text" id="d" placeholder="Đơn cày (V4, Farm Tiền, CDK...)">
        <input type="number" id="t" placeholder="Số tiền cày (VNĐ)">
        
        <button class="btn-save" onclick="save()">1. Tạo Đơn & Lưu Hệ Thống</button>
        <button class="btn-view" onclick="showHistory()">2. Xem Lịch Sử Đơn</button>
        <button class="btn-view" onclick="summary()">3. Tổng Kết Thu Nhập</button>
        <button class="btn-save" onclick="updateStatus()">4. Đổi Trạng Thái (Hoàn Thành)</button>
        
        <div id="out" class="result">Hệ thống sẵn sàng...</div>
    </div>

    <script>
        const firebaseConfig = { databaseURL: "https://an1324-ee78b-default-rtdb.asia-southeast1.firebasedatabase.app/" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        function save() {
            let user = document.getElementById('u').value;
            let don = document.getElementById('d').value;
            let tien = document.getElementById('t').value;
            if(!user || !don) return alert("Vui lòng nhập đủ tên acc và đơn cày!");

            db.ref('Orders/' + user).set({
                don_cay: don,
                so_tien: Number(tien),
                trang_thai: "Đang xử lý"
            }).then(() => {
                document.getElementById('out').innerText = "✅ Đã lưu đơn cho: " + user + "\nĐã đồng bộ với Script Roblox!";
            });
        }

        function showHistory() {
            db.ref('Orders').once('value', (s) => {
                let data = s.val();
                if(!data) return document.getElementById('out').innerText = "Chưa có đơn nào!";
                let txt = "📋 LỊCH SỬ ĐƠN CÀY:\n----------------------\n";
                for(let id in data) {
                    txt += `Acc: ${id} | Đơn: ${data[id].don_cay} | [${data[id].trang_thai}]\n`;
                }
                document.getElementById('out').innerText = txt;
            });
        }

        function summary() {
            db.ref('Orders').once('value', (s) => {
                let data = s.val();
                let tong = 0;
                for(let id in data) { tong += data[id].so_tien || 0; }
                document.getElementById('out').innerText = "💰 TỔNG TIỀN ĐÃ CÀY:\n" + tong.toLocaleString() + " VNĐ";
            });
        }

        function updateStatus() {
            let user = document.getElementById('u').value;
            if(!user) return alert("Nhập tên acc muốn hoàn thành!");
            db.ref('Orders/' + user).update({ trang_thai: "Hoàn thành" }).then(() => {
                document.getElementById('out').innerText = "✅ Đã cập nhật trạng thái HOÀN THÀNH cho " + user;
            });
        }
    </script>
</body>
</html>
